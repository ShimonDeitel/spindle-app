name: Spindle
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Spindle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Spindle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fiberjournal
        INFOPLIST_FILE: Spindle/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Spindle - Fiber Journal"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Spindle/Info.plist
      properties:
        CFBundleDisplayName: "Spindle - Fiber Journal"
        ITSAppUsesNonExemptEncryption: false
  SpindleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpindleTests
    dependencies:
      - target: Spindle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fiberjournal.tests
  SpindleUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpindleUITests
    dependencies:
      - target: Spindle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fiberjournal.uitests
schemes:
  Spindle:
    build:
      targets:
        Spindle: all
    test:
      targets:
        - SpindleTests
        - SpindleUITests
    run:
      config: Debug
